# Browser Configuration
default.browser=chrome
headless.mode=false

# Timeout Settings
default.timeout=10
page.load.timeout=30
implicit.wait.timeout=10

# Application URLs
default.url=https://www.google.com
base.url=https://www.google.com

# Directory Settings
screenshot.directory=./screenshots/
reports.directory=./reports/
logs.directory=./logs/

# Window Settings
window.width=1920
window.height=1080
window.maximize=true

# Screenshot Settings
screenshot.format=PNG
screenshot.quality=1.0
full.page.screenshots=true
element.screenshots=true

# Retry Settings
max.retry.attempts=3
retry.delay.milliseconds=1000

# Environment Settings
environment=test
test.data.path=./testData/

# Logging Settings
log.level=INFO
log.file.pattern=%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n

# Browser Options
chrome.options=--disable-notifications,--disable-popup-blocking,--disable-dev-shm-usage,--no-sandbox
firefox.options=dom.webnotifications.enabled:false,dom.push.enabled:false
edge.options=--disable-notifications,--disable-popup-blocking

# Parallel Execution
parallel.execution=false
thread.count=1